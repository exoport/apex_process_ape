# aped runtime/state/log dirs (PLAN-18 Appendix A). Processed by
# systemd-tmpfiles-setup at boot, before sockets.target — so /run/aped exists
# when aped-priv.socket binds /run/aped/priv.sock.
#
# Install to /etc/tmpfiles.d/aped.conf.
#
# Modes: the root executor (aped.service, User=root) and the de-privileged
# front (aped-front.service, User=aped) BOTH write under /var/lib/aped and
# cooperate via the shared `ape` group, so the state tree is group-writable
# (0770 root:ape) — a plain 0700 would lock the aped user out and the front
# would fail to write its NATS store / keys / operator.creds. /run/aped stays
# 0710 (the front only traverses it to reach the 0660 root:ape priv socket)
# and /var/log/aped stays 0750 (only the root executor writes the audit log).
# Type Path            Mode UID  GID  Age Argument
d      /run/aped       0710 root ape  -
d      /var/lib/aped   0770 root ape  -
d      /var/lib/aped/keys  0770 root ape -
d      /var/lib/aped/creds 0770 root ape -
d      /var/log/aped   0750 root ape  -
