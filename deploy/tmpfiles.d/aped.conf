# aped runtime/state/log dirs (PLAN-18 Appendix A). Processed by
# systemd-tmpfiles-setup at boot, before sockets.target — so /run/aped exists
# when aped-priv.socket binds /run/aped/priv.sock.
#
# Install to /etc/tmpfiles.d/aped.conf.
#
# Type Path            Mode UID  GID  Age Argument
d      /run/aped       0710 root ape  -
d      /var/lib/aped   0700 root ape  -
d      /var/lib/aped/keys  0700 root ape -
d      /var/lib/aped/creds 0710 root ape -
d      /var/log/aped   0750 root ape  -
