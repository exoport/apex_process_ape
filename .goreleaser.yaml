project_name: ape
dist: dist

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/ape
    binary: ape
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -X github.com/diegosz/apex_process_ape/internal/apecmd.Version={{.Version}}
      - -X github.com/diegosz/apex_process_ape/internal/apecmd.BuildDate={{.Date}}
      - -X github.com/diegosz/apex_process_ape/internal/apecmd.GitCommit={{.Commit}}

archives:
  - format_overrides:
      - goos: windows
        format: zip
    name_template: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}'
    files: [README.md, LICENSE]

checksum:
  name_template: '{{ .ProjectName }}_checksums.txt'
  algorithm: sha256

release:
  github:
    owner: diegosz
    name: apex_process_ape
  prerelease: auto

changelog:
  use: github
  sort: asc
