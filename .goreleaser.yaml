version: 2

project_name: ape
dist: dist

before:
  hooks:
    - go mod tidy

builds:
  - id: ape
    main: ./cmd/ape
    binary: ape
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -X github.com/exoport/apex_process_ape/internal/apecmd.Version={{.Version}}
      - -X github.com/exoport/apex_process_ape/internal/apecmd.BuildDate={{.Date}}
      - -X github.com/exoport/apex_process_ape/internal/apecmd.GitCommit={{.Commit}}
  # aped is the rootful VM-management daemon (PLAN-18). It is Linux-only (Kata +
  # AF_UNIX + KVM); the code cross-compiles but only functions on Linux, so it
  # ships for linux only.
  - id: aped
    main: ./cmd/aped
    binary: aped
    env:
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -X github.com/exoport/apex_process_ape/internal/apedcmd.Version={{.Version}}
      - -X github.com/exoport/apex_process_ape/internal/apedcmd.BuildDate={{.Date}}
      - -X github.com/exoport/apex_process_ape/internal/apedcmd.GitCommit={{.Commit}}

archives:
  # aped ships for linux only, so the linux archives carry two binaries
  # (ape + aped) while darwin/windows carry one — intentional, not confusing.
  - allow_different_binary_count: true
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}'
    files:
      - README.md
      - LICENSE
      - src: deploy/policy.yaml
        dst: deploy
      - src: deploy/**/*
        dst: deploy

checksum:
  name_template: '{{ .ProjectName }}_checksums.txt'
  algorithm: sha256

# Keyless cosign signing of the checksums file via Sigstore Fulcio, emitted as
# a self-contained Sigstore bundle (--new-bundle-format): the Fulcio cert,
# the signature, the certificate-transparency SCT, and the Rekor inclusion
# proof in one ape_checksums.txt.bundle file. `ape update` verifies it fully
# offline against an embedded Sigstore trusted root (no cosign binary needed);
# humans verify with `cosign verify-blob --bundle ape_checksums.txt.bundle
# --new-bundle-format --certificate-identity … --certificate-oidc-issuer …`.
# No keys to provision — the GitHub Actions OIDC token is exchanged for a
# short-lived Fulcio cert at sign time and recorded in Rekor.
signs:
  - cmd: cosign
    signature: '${artifact}.bundle'
    args:
      - 'sign-blob'
      - '--yes'
      - '--new-bundle-format'
      - '--bundle=${signature}'
      - '${artifact}'
    artifacts: checksum

release:
  github:
    owner: exoport
    name: apex_process_ape
  prerelease: auto

changelog:
  use: github
  sort: asc
