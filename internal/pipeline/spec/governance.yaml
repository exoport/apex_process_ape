name: governance
# After the design pipeline runs, apex-shard-doc rewrites prd.md and
# architecture.md into prd/ and architecture/ shard directories and
# deletes the originals. Preflight uses os.Stat (content-agnostic),
# so checking the sharded directory paths is correct.
requires:
  files:
    - development/planning/architecture
    - development/planning/prd
stages:
  pattern-governance:
    chain:
      - skill: apex-pattern-reconciliation
        model: "opus[1m]"
      - skill: apex-pattern-survey
        model: "opus[1m]"
      - skill: apex-pattern-generate
        model: "opus[1m]"
      - skill: apex-pattern-update
        model: "opus[1m]"
        args: "--from-status draft --target-status adopted"
  adr-governance:
    chain:
      - skill: apex-adr-reconciliation
        model: "opus[1m]"
      - skill: apex-adr-survey
        model: "opus[1m]"
      - skill: apex-adr-adoption
        model: "opus[1m]"
      - skill: apex-adr-update
        model: "opus[1m]"
        args: "--from-status proposed --target-status accepted"
      - skill: apex-adr-picking
        model: "opus[1m]"
      - skill: apex-adr-adoption
        model: "opus[1m]"
      - skill: apex-adr-update
        model: "opus[1m]"
        args: "--from-status proposed --target-status accepted"
  capability-activation:
    chain:
      - skill: apex-capability-survey
        model: "opus[1m]"
      - skill: apex-capability-create
        model: "opus[1m]"
      - skill: apex-capability-update
        model: "opus[1m]"
        args: "--from-status proposed --target-status accepted"
  feature-activation:
    chain:
      - skill: apex-feature-survey
        model: "opus[1m]"
      - skill: apex-feature-create
        model: "opus[1m]"
      - skill: apex-feature-update
        model: "opus[1m]"
        args: "--from-status proposed --target-status specified"
  generate-project-context:
    chain:
      - skill: apex-generate-project-context
        model: sonnet
