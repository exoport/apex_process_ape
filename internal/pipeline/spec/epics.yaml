name: epics
# Post-design + post-governance state: architecture is sharded into a
# directory; project-context.md is produced by apex-generate-project-
# context as a single file at development/project-context.md.
requires:
  files:
    - development/planning/architecture
    - development/project-context.md
stages:
  create-epics:
    chain:
      - skill: apex-create-epics-and-stories
        agent: apex-agent-pm
        model: "opus[1m]"
        prompt_flag: "--prompt"
  shard-epics:
    chain:
      - skill: apex-shard-doc
        args: "--doc epics"
  sprint-planning:
    chain:
      - skill: apex-sprint-planning
        model: "opus[1m]"
