name: CI

on:
  push:
    branches: [main]
    # Pre-release tags (v0.0.20-rc1, v0.0.20-beta, …) re-run the full
    # matrix against the exact tagged SHA before a final-semver tag
    # promotes it to a real release. Release.yml ignores these tags.
    # See docs/how-to/pre-tag-release.md.
    tags: ['v[0-9]+.[0-9]+.[0-9]+-*']
  pull_request:

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        # bash is available on all three runners (MSYS2-provided on
        # Windows). Pin it so `./ape version` and Makefile invocations
        # work uniformly across the matrix.
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Smoke — ./ape version
        # Catches //go:build constraint regressions that would let a
        # package compile but produce a binary that errors on first
        # invocation under the matrix OS. The MSYS2 bash on
        # windows-latest resolves `./ape` to the literal output of
        # `go build -o ape`, no .exe suffix.
        run: ./ape version

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        run: make lint

  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        run: make govulncheck
