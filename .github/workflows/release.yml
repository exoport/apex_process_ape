name: Release

on:
  push:
    tags:
      # Only final-semver tags trigger the public release.
      # Pre-release tags like v0.0.20-rc1 are pushed to verify CI across
      # the matrix (Linux + Windows) without producing GitHub Releases.
      # See docs/how-to/pre-tag-release.md for the workflow.
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write   # required for keyless cosign signing via Sigstore Fulcio

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
